---
node_exporter_version: "1.11.1"
node_exporter_user: "node_exporter"
node_exporter_group: "node_exporter"
node_exporter_install_dir: "/usr/local/bin"
node_exporter_data_dir: "/var/lib/node_exporter"

node_exporter_arch_map:
  x86_64: "amd64"
  aarch64: "arm64"
  armv7l: "armv7"

node_exporter_arch: "{{ node_exporter_arch_map.get(ansible_architecture, ansible_architecture) }}"
node_exporter_filename: "node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}"
node_exporter_download_url: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/{{ node_exporter_filename }}.tar.gz"