---
- name: Zorg dat benodigde packages aanwezig zijn
  ansible.builtin.apt:
    name:
      - tar
    state: present
    update_cache: true

- name: Maak node_exporter group aan
  ansible.builtin.group:
    name: "{{ node_exporter_group }}"
    system: true
    state: present

- name: Maak node_exporter user aan
  ansible.builtin.user:
    name: "{{ node_exporter_user }}"
    group: "{{ node_exporter_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false
    state: present

- name: Maak data directory aan
  ansible.builtin.file:
    path: "{{ node_exporter_data_dir }}"
    state: directory
    owner: "{{ node_exporter_user }}"
    group: "{{ node_exporter_group }}"
    mode: "0755"

- name: Download node_exporter release
  ansible.builtin.get_url:
    url: "{{ node_exporter_download_url }}"
    dest: "/tmp/{{ node_exporter_filename }}.tar.gz"
    mode: "0644"

- name: Pak node_exporter archive uit
  ansible.builtin.unarchive:
    src: "/tmp/{{ node_exporter_filename }}.tar.gz"
    dest: /tmp
    remote_src: true

- name: Installeer node_exporter binary
  ansible.builtin.copy:
    src: "/tmp/{{ node_exporter_filename }}/node_exporter"
    dest: "{{ node_exporter_install_dir }}/node_exporter"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  notify: Restart node_exporter