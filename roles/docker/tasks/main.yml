---
- name: Zorg dat prerequisites aanwezig zijn
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
    state: present
    update_cache: true

- name: Verwijder conflicterende Docker pakketten
  ansible.builtin.apt:
    name: "{{ docker_conflicting_packages }}"
    state: absent
    purge: true

- name: Maak apt keyrings directory aan
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: true

- name: Zet architecture string voor Docker repo
  ansible.builtin.set_fact:
    docker_repo_arch: >-
      {{
        'amd64' if ansible_architecture == 'x86_64'
        else 'arm64' if ansible_architecture in ['aarch64', 'arm64']
        else 'armhf' if ansible_architecture in ['armv7l', 'armhf']
        else ansible_architecture
      }}

- name: Voeg Docker repository toe
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ docker_repo_arch }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ ansible_distribution | lower }}
      {{ ansible_distribution_release }} stable
    filename: docker
    state: present
    update_cache: true

- name: Installeer Docker Engine en plugins
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: true

- name: Zorg dat docker group bestaat
  ansible.builtin.group:
    name: docker
    state: present

- name: Voeg users toe aan docker groep
  ansible.builtin.user:
    name: "{{ item }}"
    groups: docker
    append: true
  loop: "{{ docker_users }}"

- name: Enable en start Docker service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
