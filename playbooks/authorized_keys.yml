---
- name: Beheer users, keys en sudo
  hosts: servers
  become: true
  vars:
    managed_users:
      - bart
      - jane
      - root

    passwordless_sudo_users:
      - bart
      - jane

  tasks:
    - name: Zorg dat gebruiker jane bestaat
      ansible.builtin.user:
        name: jane
        state: present
        shell: /bin/bash
        create_home: true

    - name: Verzamel alle public key files op de Ansible-controller
      ansible.builtin.set_fact:
        public_key_files: "{{ lookup('ansible.builtin.fileglob', playbook_dir + '/../files/ssh-keys/*.pub', wantlist=True) }}"

    - name: Zorg dat .ssh map bestaat voor bart en jane
      ansible.builtin.file:
        path: "/home/{{ item }}/.ssh"
        state: directory
        owner: "{{ item }}"
        group: "{{ item }}"
        mode: "0700"
      loop:
        - bart
        - jane

    - name: Zorg dat .ssh map bestaat voor root
      ansible.builtin.file:
        path: /root/.ssh
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Voeg alle public keys toe voor bart, jane en root
      ansible.posix.authorized_key:
        user: "{{ item.0 }}"
        state: present
        key: "{{ lookup('ansible.builtin.file', item.1) }}"
        manage_dir: false
      loop: "{{ managed_users | product(public_key_files) | list }}"

    - name: Sta passwordless sudo toe voor bart en jane
      ansible.builtin.copy:
        dest: "/etc/sudoers.d/{{ item }}"
        content: "{{ item }} ALL=(ALL) NOPASSWD:ALL\n"
        owner: root
        group: root
        mode: "0440"
        validate: "/usr/sbin/visudo -cf %s"
      loop: "{{ passwordless_sudo_users }}"
